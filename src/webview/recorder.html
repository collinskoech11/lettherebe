<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; 
        script-src 'unsafe-inline' vscode-resource: https:; 
        style-src 'unsafe-inline' vscode-resource:;">
    <meta http-equiv="Permissions-Policy" content="microphone=*">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src ${webview.cspSource}; script-src ${webview.cspSource};">
    <title>Voice Recorder</title>
    <link rel="stylesheet" href="${webview.css}">
</head>

<body>
    <h1>Voice Recorder</h1>
    <button id="startButton">Start Recording</button>
    <button id="stopButton" disabled>Stop Recording</button>
    <p id="status">Idle</p>
    <script src="${webview.js}"></script>
</body>

</html>
